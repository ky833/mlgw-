        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MLGW Virtual Assistant</title>
        <style>
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: #001f3f;
                margin: 0;
                padding: 20px;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .card {
                background: white;
                padding: 25px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                width: 100%;
                max-width: 450px;
                box-sizing: border-box;
            }
            h2 {
                margin-top: 0;
                color: #0056b3;
                text-align: center;
            }
            .input-group {
                margin-bottom: 15px;
            }
            label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
                font-size: 14px;
            }
            input[type="text"] {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                box-sizing: border-box;
            }
            button {
                width: 100%;
                padding: 12px;
                background: #0056b3;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                cursor: pointer;
                font-weight: bold;
            }
            button:hover {
                background: #004085;
            }

            #chat-interface {
                display: none;
                flex-direction: column;
                height: 500px;
            }
            #chat-box {
                flex-grow: 1;
                border: 1px solid #eee;
                padding: 15px;
                overflow-y: auto;
                background: #fafafa;
                border-radius: 6px;
                margin-bottom: 15px;
            }
            .msg {
                margin-bottom: 12px;
                padding: 10px 14px;
                border-radius: 8px;
                max-width: 80%;
                line-height: 1.4;
                font-size: 14px;
            }
            .user-msg {
                background: #0056b3;
                color: white;
                margin-left: auto;
                text-align: right;
            }
            .bot-msg {
                background: #e9ecef;
                color: #333;
            }
            .input-row {
                display: flex;
                gap: 10px;
            }
            #user-input {
                flex-grow: 1;
            }
            #send-btn {
                width: auto;
                padding: 0 20px;
            }
        </style>
    
    
        <div id="setup-card" class="card">
            <h2>MLGW Assistant Setup</h2>
            <div class="input-group">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" placeholder="John">
            </div>
            <div class="input-group">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" placeholder="Doe">
            </div>
            <button onclick="startChat()">Connect to MLGW Assistant</button>
        </div>

        <div id="chat-interface" class="card">
            <h2>MLGW Virtual Assistant</h2>
            <div id="chat-box"></div>
            <div class="input-row">
                <input type="text" id="user-input" placeholder="Type your utility question..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <script>
            const BACKEND_URL = "http://localhost:3000";
            // Unique ID to keep track of this tab's chat session on the server
            const sessionId = Math.random().toString(36).substring(2, 15);
            let userFirstName = "";

            async function startChat() {
                userFirstName = document
                    .getElementById("first-name")
                    .value.trim();
                const lastName = document
                    .getElementById("last-name")
                    .value.trim();

                if (!userFirstName || !lastName) {
                    alert("Please enter both your first and last name.");
                    return;
                }

                // Hide login, show chat interface
                document.getElementById("setup-card").style.display = "none";
                document.getElementById("chat-interface").style.display =
                    "flex";

                appendMessage(
                    "Connecting to MLGW Virtual Assistant...",
                    "bot-msg",
                );

                try {
                    const response = await fetch(
                        `${BACKEND_URL}/api/chat/start`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                firstName: userFirstName,
                                lastName,
                                sessionId,
                            }),
                        },
                    );
                    const data = await response.json();

                    // Clear the connecting text and add the real greeting
                    document.getElementById("chat-box").innerHTML = "";
                    appendMessage(data.reply, "bot-msg");
                } catch (err) {
                    appendMessage(
                        "Error establishing connection to backend.",
                        "bot-msg",
                    );
                }
            }

            async function sendMessage() {
                const inputEl = document.getElementById("user-input");
                const message = inputEl.value.trim();
                if (!message) return;

                // Display user message instantly
                appendMessage(message, "user-msg");
                inputEl.value = "";

                try {
                    const response = await fetch(
                        `${BACKEND_URL}/api/chat/message`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ sessionId, message }),
                        },
                    );
                    const data = await response.json();
                    appendMessage(data.reply, "bot-msg");
                } catch (err) {
                    appendMessage(
                        "Error: Cloud services unavailable right now.",
                        "bot-msg",
                    );
                }
            }

            function appendMessage(text, className) {
                const chatBox = document.getElementById("chat-box");
                const msgDiv = document.createElement("div");
                msgDiv.className = `msg ${className}`;
                msgDiv.innerText = text;
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight; // Auto-scrolls to bottom
            }

            function handleKeyPress(e) {
                if (e.key === "Enter") sendMessage();
            }
        </script>
    

</body></html>
